<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Noman Mobile</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800&display=swap" rel="stylesheet">


    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Inter, Arial, sans-serif;
        }


        body {

            height: 100vh;
            background: #fafafa;
            color: #111;
            overflow: hidden;

        }


        /* BACKGROUND */

        .circle1,
        .circle2 {

            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: .25;
            z-index: -1;

        }


        .circle1 {

            width: 300px;
            height: 300px;
            background: #c79b30;
            top: -100px;
            left: -100px;

        }


        .circle2 {

            width: 300px;
            height: 300px;
            background: #ddd;
            bottom: -100px;
            right: -100px;

        }


        /* MAIN */

        .container {

            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;

        }


        .content {

            animation: fade 1.5s ease;

        }


        @keyframes fade {

            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: none;
            }

        }


        /* LOGO */

        .logo {

            font-size: 72px;
            font-weight: 800;
            letter-spacing: -3px;

        }


        .logo span {

            color: #c79b30;

        }


        .line {

            width: 100px;
            height: 1px;
            background: #c79b30;
            margin: 35px auto;

        }



        /* TEXT */

        h1 {

            font-size: 48px;
            font-weight: 600;

        }


        .subtitle {

            margin-top: 20px;
            font-size: 20px;
            color: #555;
            font-weight: 300;

        }


        .opening {

            margin-top: 45px;
            color: #777;
            font-size: 18px;

        }



        /* COUNTDOWN */

        .countdown {

            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;

        }


        .box {

            width: 90px;
            height: 90px;

            background: white;

            border-radius: 18px;

            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;


            box-shadow:
                0 10px 30px rgba(0, 0, 0, .08);

        }


        .box span {

            font-size: 32px;
            font-weight: 700;
            color: #c79b30;

        }


        .box small {

            font-size: 12px;
            color: #777;

        }



        .date {

            margin-top: 25px;
            font-size: 18px;
            color: #555;

        }



        /* BUTTON */

        .button {

            display: inline-block;

            margin-top: 40px;

            padding: 15px 40px;

            border-radius: 50px;

            background: #111;

            color: white;

            text-decoration: none;

            transition: .3s;

        }


        .button:hover {

            background: #c79b30;
            transform: translateY(-3px);

        }



        /* OPEN PAGE */


        .services {

            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 40px 0;
            flex-wrap: wrap;

        }


        .service {

            background: white;

            width: 140px;

            padding: 25px 10px;

            border-radius: 20px;

            box-shadow:
                0 10px 30px rgba(0, 0, 0, .08);

            font-size: 15px;

        }


        .service span {

            font-size: 30px;

        }



        .whatsapp {

            background: #25D366;
            margin-left: 10px;

        }



        @media(max-width:700px) {


            .logo {

                font-size: 48px;

            }


            h1 {

                font-size: 34px;

            }


            .subtitle {

                font-size: 17px;

            }


            .countdown {

                gap: 8px;

            }


            .box {

                width: 75px;
                height: 75px;

            }


            .box span {

                font-size: 25px;

            }


            .service {

                width: 120px;

            }


        }
    </style>

</head>



<body>


    <div class="circle1"></div>
    <div class="circle2"></div>



    <div class="container">

        <div class="content" id="page">


            <!-- CONTENT WILL LOAD HERE -->


        </div>

    </div>



    <script>


        // CHANGE THIS DATE

        const openingDate =
            new Date("July 15, 2026 01:24:00").getTime();



        function showComingSoon() {


            document.getElementById("page").innerHTML = `


<div class="logo">
Noman<span>Mobile</span>
</div>


<div class="line"></div>


<h1>
Grand Opening Soon
</h1>


<p class="subtitle">
Premium Mobile Repair & Technology Services
</p>


<div class="opening">
Opening Ceremony
</div>



<div class="countdown">


<div class="box">
<span id="days">00</span>
<small>Days</small>
</div>


<div class="box">
<span id="hours">00</span>
<small>Hours</small>
</div>


<div class="box">
<span id="minutes">00</span>
<small>Minutes</small>
</div>


<div class="box">
<span id="seconds">00</span>
<small>Seconds</small>
</div>


</div>



<div class="date">
15 July 2026 | 1:24 AM
</div>



<a class="button">
Stay Tuned
</a>


`;



        }



        function showOpened() {


            document.getElementById("page").innerHTML = `


<div class="logo">
Noman<span>Mobile</span>
</div>


<div class="line"></div>



<h1>
We Are Open 🎉
</h1>



<p class="subtitle">

Your Trusted Mobile Repair Center

</p>



<div class="services">


<div class="service">
<span>📱</span>
<br>
Mobile Repair
</div>


<div class="service">
<span>🔧</span>
<br>
Hardware Repair
</div>


<div class="service">
<span>⚡</span>
<br>
Software Service
</div>


<div class="service">
<span>🎧</span>
<br>
Accessories
</div>


</div>



<a class="button" href="tel:+918795561029">
Call Now
</a>



<a class="button whatsapp" href="https://wa.link/9y5dxb">
WhatsApp
</a>


`;



        }




        function update() {


            const now = new Date().getTime();

            const distance = openingDate - now;



            if (distance <= 0) {

                showOpened();

                return;

            }



            showComingSoon();



            let days =
                Math.floor(distance / (1000 * 60 * 60 * 24));


            let hours =
                Math.floor(
                    (distance % (1000 * 60 * 60 * 24))
                    /
                    (1000 * 60 * 60)
                );


            let minutes =
                Math.floor(
                    (distance % (1000 * 60 * 60))
                    /
                    (1000 * 60)
                );


            let seconds =
                Math.floor(
                    (distance % (1000 * 60))
                    /
                    1000
                );



            document.getElementById("days").innerHTML =
                String(days).padStart(2, "0");


            document.getElementById("hours").innerHTML =
                String(hours).padStart(2, "0");


            document.getElementById("minutes").innerHTML =
                String(minutes).padStart(2, "0");


            document.getElementById("seconds").innerHTML =
                String(seconds).padStart(2, "0");



        }



        update();

        setInterval(update, 1000);


    </script>


</body>

</html>
