<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Noman Mobile</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">


    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Inter, Arial, sans-serif;
        }


        body {

            height: 100vh;
            background: #fafafa;
            color: #111;
            overflow: hidden;

        }



        /* BACKGROUND */

        .circle1,
        .circle2 {

            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: .25;
            z-index: -1;

        }


        .circle1 {

            width: 300px;
            height: 300px;
            background: #c79b30;
            top: -100px;
            left: -100px;

        }


        .circle2 {

            width: 300px;
            height: 300px;
            background: #ddd;
            bottom: -100px;
            right: -100px;

        }



        /* MAIN */

        .container {

            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;

        }


        .content {

            animation: fade 1.5s ease;

        }



        @keyframes fade {

            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: none;
            }

        }



        /* LOGO */

        .logo {

            font-size: 72px;
            font-weight: 800;
            letter-spacing: -3px;

        }


        .logo span {

            color: #c79b30;

        }


        .line {

            width: 100px;
            height: 1px;
            background: #c79b30;
            margin: 35px auto;

        }



        h1 {

            font-size: 48px;
            font-weight: 600;

        }


        .subtitle {

            margin-top: 20px;
            font-size: 20px;
            color: #555;
            font-weight: 300;

        }


        .opening {

            margin-top: 45px;
            color: #777;
            font-size: 18px;

        }



        /* COUNTDOWN */

        .countdown {

            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;

        }


        .box {

            width: 90px;
            height: 90px;

            background: white;
            border-radius: 18px;

            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;

            box-shadow:
                0 10px 30px rgba(0, 0, 0, .08);

        }


        .box span {

            font-size: 32px;
            font-weight: 700;
            color: #c79b30;

        }


        .box small {

            font-size: 12px;
            color: #777;

        }


        .date {

            margin-top: 25px;
            font-size: 18px;
            color: #555;

        }



        /* BUTTON */

        .button {

            display: inline-block;

            margin-top: 40px;

            padding: 15px 40px;

            border-radius: 50px;

            background: #111;

            color: white;

            text-decoration: none;

            transition: .3s;

        }


        .button:hover {

            background: #c79b30;
            transform: translateY(-3px);

        }



        /* OPEN PAGE */

        .services {

            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 40px 0;
            flex-wrap: wrap;

        }


        .service {

            background: white;

            width: 140px;

            padding: 25px 10px;

            border-radius: 20px;

            box-shadow:
                0 10px 30px rgba(0, 0, 0, .08);

        }


        .service span {

            font-size: 30px;

        }



        .whatsapp {

            background: #25D366;
            margin-left: 10px;

        }



        /* CELEBRATION */


        .celebrate {

            animation: celebrateIn 1.5s ease;

        }


        @keyframes celebrateIn {

            0% {
                opacity: 0;
                transform: scale(.5);
            }

            70% {
                transform: scale(1.1);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }

        }



        .balloon {

            position: fixed;

            bottom: -100px;

            width: 35px;
            height: 45px;

            border-radius: 50%;

            z-index: 999;

            animation: fly 5s linear forwards;

        }


        .balloon:after {

            content: "";

            position: absolute;

            height: 35px;
            width: 2px;

            background: #555;

            bottom: -35px;

            left: 50%;

        }



        @keyframes fly {

            to {

                transform:
                    translateY(-120vh) rotate(360deg);

                opacity: 0;

            }

        }



        .confetti {

            position: fixed;

            top: -20px;

            width: 10px;
            height: 20px;

            z-index: 999;

            animation: drop 4s linear forwards;

        }



        @keyframes drop {

            to {

                transform:
                    translateY(110vh) rotate(720deg);

            }

        }



        .flash {

            position: fixed;

            inset: 0;

            background: #c79b30;

            z-index: 998;

            animation: flash .8s;

        }


        @keyframes flash {

            from {
                opacity: .8;
            }

            to {
                opacity: 0;
            }

        }




        @media(max-width:700px) {


            .logo {

                font-size: 48px;

            }


            h1 {

                font-size: 34px;

            }


            .subtitle {

                font-size: 17px;

            }


            .box {

                width: 75px;
                height: 75px;

            }


            .box span {

                font-size: 25px;

            }


            .service {

                width: 120px;

            }


        }
    </style>

</head>



<body>


    <div class="circle1"></div>
    <div class="circle2"></div>



    <div class="container">

        <div class="content" id="page"></div>

    </div>




    <script>


        // SET INAUGURATION DATE

        const openingDate =
            new Date("August 20, 2026 11:00:00").getTime();


        let opened = false;



        function showComingSoon() {


            document.getElementById("page").innerHTML = `

<div class="logo">
Noman<span>Mobile</span>
</div>


<div class="line"></div>


<h1>
Grand Opening Soon
</h1>


<p class="subtitle">
Premium Mobile Repair & Technology Services
</p>


<div class="opening">
Opening Ceremony
</div>



<div class="countdown">


<div class="box">
<span id="days">00</span>
<small>Days</small>
</div>


<div class="box">
<span id="hours">00</span>
<small>Hours</small>
</div>


<div class="box">
<span id="minutes">00</span>
<small>Minutes</small>
</div>


<div class="box">
<span id="seconds">00</span>
<small>Seconds</small>
</div>


</div>



<div class="date">
20 August 2026 | 11:00 AM
</div>

<div class="date" style="font-size:16px; margin-top:12px;">
📍
<a href="https://maps.google.com/?q=Roshan+Chauraha,+Rasoolabad,+Amardobha,+Sant+Kabir+Nagar+272199"
   target="_blank"
   style="text-decoration:none;color:#555;">
Roshan Chauraha, Rasoolabad, Amardobha, S.K.N. 272199
</a>
</div>



<a class="button">
Stay Tuned
</a>

`;

        }



        function celebration() {


            let flash = document.createElement("div");

            flash.className = "flash";

            document.body.appendChild(flash);


            setTimeout(() => flash.remove(), 800);



            let colors = [
                "#ff4d6d",
                "#ffd166",
                "#06d6a0",
                "#118ab2",
                "#c77dff"
            ];



            for (let i = 0; i < 30; i++) {


                let b = document.createElement("div");

                b.className = "balloon";

                b.style.left = Math.random() * 100 + "vw";

                b.style.background =
                    colors[Math.floor(Math.random() * colors.length)];


                b.style.animationDuration =
                    (3 + Math.random() * 3) + "s";


                document.body.appendChild(b);


                setTimeout(() => b.remove(), 6000);

            }




            for (let i = 0; i < 100; i++) {


                let c = document.createElement("div");

                c.className = "confetti";

                c.style.left = Math.random() * 100 + "vw";

                c.style.background =
                    colors[Math.floor(Math.random() * colors.length)];


                c.style.animationDuration =
                    (2 + Math.random() * 3) + "s";


                document.body.appendChild(c);


                setTimeout(() => c.remove(), 5000);

            }


        }





        function showOpened() {


            opened = true;

            celebration();



            document.getElementById("page").innerHTML = `

<div class="celebrate">


<div class="logo">
Noman<span>Mobile</span>
</div>


<div class="line"></div>


<h1>
We Are Open 🎉
</h1>


<p class="subtitle">
Your Trusted Mobile Repair Center
</p>

<div class="date" style="font-size:16px; margin-top:12px;">
📍
<a href="https://maps.google.com/?q=Roshan+Chauraha,+Rasoolabad,+Amardobha,+Sant+Kabir+Nagar+272199"
   target="_blank"
   style="text-decoration:none;color:#555;">
Roshan Chauraha, Rasoolabad, Amardobha, S.K.N. 272199
</a>
</div>



<div class="services">


<div class="service">
<span>📱</span>
<br>
Mobile Repair
</div>


<div class="service">
<span>🔧</span>
<br>
Hardware Repair
</div>


<div class="service">
<span>⚡</span>
<br>
Software Service
</div>


<div class="service">
<span>🎧</span>
<br>
Accessories
</div>


</div>



<a class="button" href="tel:+91XXXXXXXXXX">
Call Now
</a>


<a class="button whatsapp">
WhatsApp
</a>


</div>

`;

        }




        function update() {


            if (opened) return;


            let now = new Date().getTime();

            let distance = openingDate - now;



            if (distance <= 0) {

                showOpened();

                return;

            }



            let days = Math.floor(
                distance / (1000 * 60 * 60 * 24)
            );


            let hours = Math.floor(
                (distance % (1000 * 60 * 60 * 24))
                / (1000 * 60 * 60)
            );


            let minutes = Math.floor(
                (distance % (1000 * 60 * 60))
                /
                (1000 * 60)
            );


            let seconds = Math.floor(
                (distance % (1000 * 60))
                /
                1000
            );



            document.getElementById("days").innerHTML =
                String(days).padStart(2, "0");


            document.getElementById("hours").innerHTML =
                String(hours).padStart(2, "0");


            document.getElementById("minutes").innerHTML =
                String(minutes).padStart(2, "0");


            document.getElementById("seconds").innerHTML =
                String(seconds).padStart(2, "0");


        }




        showComingSoon();

        update();

        setInterval(update, 1000);


    </script>


</body>

</html>
